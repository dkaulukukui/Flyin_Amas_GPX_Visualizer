            }

            // OPTION 5 (SERVER-SIDE CONVERSION) - Future Implementation:
            // If you want to always provide MP4 output regardless of browser:
            // 1. Upload blob to server endpoint: POST /api/convert-video with FormData
            // 2. Server uses FFmpeg to convert WebM → MP4 (takes ~5-10 seconds)
            // 3. Return MP4 download URL or stream MP4 directly
            // 4. User downloads MP4 file
            //
            // Server-side conversion provides:
            // - Universal MP4 output for all users
            // - Fast conversion (server CPU vs browser)
            // - No client-side overhead (no 30MB FFmpeg.wasm library)
            //
            // Requires:
            // - Backend server (Node.js + Express, Python + Flask, etc.)
            // - FFmpeg installed on server
            // - Cloud hosting (Vercel, Netlify Functions, AWS Lambda with FFmpeg layer)
            // - Cannot use GitHub Pages (static only)
            //
            // Example server endpoint (Node.js):
            // app.post('/api/convert-video', async (req, res) => {
            //   const inputFile = req.files.video;
            //   const outputFile = `output-${Date.now()}.mp4`;
            //   await execPromise(`ffmpeg -i ${inputFile} -c:v libx264 -preset fast -crf 22 ${outputFile}`);
            //   res.download(outputFile);
            // });

            // Current approach: Direct download (client-side recording)
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `gpx-animation-${Date.now()}.${fileExtension}`;
            a.click();
            URL.revokeObjectURL(url);

            // Cleanup
            setIsRendering(false);
            setIsRecording(false);
            setExportFormat('');
            isRecordingRef.current = false;

            if (compositeStreamRef.current) {
              compositeStreamRef.current.getTracks().forEach(track => track.stop());
              compositeStreamRef.current = null;
            }
            compositeCanvasRef.current = null;
            renderCancelledRef.current = false;
          };

          // Setup (don't start recording yet - wait for Phase 2)
          const frameDuration = 1000 / targetFPS; // ms per frame at target FPS

          setIsRecording(false); // Not recording yet
          setIsRendering(true);
          setRenderProgress(0);
          isRecordingRef.current = false;
          renderCancelledRef.current = false;

          // TWO-PHASE EXPORT: Pre-render frames, then play back at correct FPS
          // Phase 1: Render all frames (slow, waits for tiles)
          // Phase 2: Play back frames at exact FPS while capturing
          const totalFrames = Math.round(exportDuration * targetFPS);

          console.log(`Starting 2-phase video export: ${totalFrames} frames at ${targetFPS} FPS`);
          console.log(`Phase 1: Pre-rendering ${totalFrames} frames (waits for tiles)`);

          // Track zoom state
          let lastZoomLevel = mapInstanceRef.current.getZoom();
          let lastCenter = mapInstanceRef.current.getCenter();

          const exportStartTime = Date.now();
          const renderedFrames = []; // Array to store rendered frame ImageData

          // PHASE 1: Pre-render all frames
          for (let frame = 0; frame <= totalFrames; frame++) {
            if (renderCancelledRef.current) {
              break;
            }

            const progressValue = (frame / totalFrames) * 100;
            setProgress(progressValue);
            setRenderProgress(progressValue);

            // Wait for React to update and render
            await new Promise(resolve => requestAnimationFrame(resolve));

            // Track whether zoom changed this frame
            let zoomChanged = false;

            // Apply zoom-to-track for this frame if enabled
            if (zoomToTrack && progressValue > 0 && progressValue < 100 && mapInstanceRef.current && tracks.length > 0) {
              const currentPositions = [];
              tracks.forEach((track, trackIndex) => {
                let visiblePoints;

                if (animationStyle === 'sequential') {
                  const tracksBeforeThis = tracks.slice(0, trackIndex);
                  const totalPointsBefore = tracksBeforeThis.reduce((sum, t) => sum + t.points.length, 0);
                  const totalPoints = tracks.reduce((sum, t) => sum + t.points.length, 0);
                  const currentTotalPoint = Math.floor((progressValue / 100) * totalPoints);
                  const pointsForThisTrack = Math.max(0, currentTotalPoint - totalPointsBefore);
                  visiblePoints = track.points.slice(0, Math.min(pointsForThisTrack, track.points.length));
                } else {
                  // Simultaneous - use absolute time-based synchronization if available
                  if (track.duration && track.startTime) {
                    const tracksWithTime = tracks.filter(t => t.startTime && t.endTime);
                    const earliestStart = Math.min(...tracksWithTime.map(t => t.startTime.getTime()));
                    const latestEnd = Math.max(...tracksWithTime.map(t => t.endTime.getTime()));
                    const totalTimeSpan = latestEnd - earliestStart;

                    const currentAbsoluteTime = earliestStart + (progressValue / 100) * totalTimeSpan;

                    if (currentAbsoluteTime < track.startTime.getTime()) {
                      visiblePoints = [];
                    } else {
                      let pointIndex = 0;
                      for (let i = 0; i < track.points.length; i++) {
                        if (track.points[i].time) {
                          const pointTime = new Date(track.points[i].time);

                          if (pointTime.getTime() <= currentAbsoluteTime) {
                            pointIndex = i;
                          } else {
                            break;
                          }
                        }
                      }

                      visiblePoints = track.points.slice(0, pointIndex + 1);
                    }
                  } else {
                    const pointCount = Math.floor((progressValue / 100) * track.points.length);
                    visiblePoints = track.points.slice(0, pointCount);
                  }
                }

                if (visiblePoints.length > 0) {
                  const lastPoint = visiblePoints[visiblePoints.length - 1];
                  currentPositions.push([lastPoint.lat, lastPoint.lon]);
                }
              });

              if (currentPositions.length > 0) {
                if (currentPositions.length === 1) {
                  mapInstanceRef.current.setView(currentPositions[0], zoomLevel, { animate: false });
                } else {
                  const bounds = L.latLngBounds(currentPositions);
                  mapInstanceRef.current.fitBounds(bounds, {
                    padding: [100, 100],
                    maxZoom: zoomLevel,
                    animate: false
                  });
                }

                // Force Leaflet to immediately apply the zoom and start loading tiles
                mapInstanceRef.current._resetView(mapInstanceRef.current.getCenter(), mapInstanceRef.current.getZoom());

                // Check if zoom or center actually changed
                const newZoom = mapInstanceRef.current.getZoom();
                const newCenter = mapInstanceRef.current.getCenter();
                if (newZoom !== lastZoomLevel || !newCenter.equals(lastCenter)) {
                  zoomChanged = true;
                  lastZoomLevel = newZoom;
                  lastCenter = newCenter;
                  // Wait for zoom and tiles
                  await new Promise(resolve => setTimeout(resolve, 100));
                  await waitForTilesToLoad(mapContainer, 1500);
                }
              }
            } else if (progressValue === 0 || progressValue >= 100) {
              // Zoom out to show all tracks at start/end
              if (tracks.length > 0 && originalBoundsRef.current && mapInstanceRef.current) {
                mapInstanceRef.current.fitBounds(originalBoundsRef.current, {
                  padding: [50, 50],
                  animate: false
                });
                // Force Leaflet to immediately apply the zoom
                mapInstanceRef.current._resetView(mapInstanceRef.current.getCenter(), mapInstanceRef.current.getZoom());

                // Check if zoom or center actually changed
                const newZoom = mapInstanceRef.current.getZoom();
                const newCenter = mapInstanceRef.current.getCenter();
                if (newZoom !== lastZoomLevel || !newCenter.equals(lastCenter)) {
                  zoomChanged = true;
                  lastZoomLevel = newZoom;
                  lastCenter = newCenter;
                  // Wait for zoom and tiles
                  await new Promise(resolve => setTimeout(resolve, 100));
                  await waitForTilesToLoad(mapContainer, 1500);
                }
              }
            }

            // If zoom didn't change, tiles are already loaded - just wait for render settle
            if (!zoomChanged) {
              await new Promise(resolve => requestAnimationFrame(resolve));
            }

            // Render frame to canvas
            captureFrame(mapContainer, compositeCanvas, exportWidth, exportHeight, offsetX, offsetY, scale, sourceWidth, sourceHeight, videoTitle, titlePosition, titleSize, titleFont, titleColor, showLegend, tracks, legendPosition, progressValue, animationStyle, mapInstanceRef.current, showAllTracks);

            // Save frame as ImageData
            const ctx = compositeCanvas.getContext('2d');
            const frameData = ctx.getImageData(0, 0, exportWidth, exportHeight);
            renderedFrames.push(frameData);

            // Log progress
            if (frame % 50 === 0) {
              console.log(`Pre-rendered frame ${frame}/${totalFrames} (${progressValue.toFixed(1)}%)`);
            }
          }

          if (renderCancelledRef.current) {
            console.log('Export cancelled during pre-render phase');
            setIsRendering(false);
            setIsRecording(false);
            isRecordingRef.current = false;

            // Restore map size
            if (originalMapSizeRef.current) {
              mapContainer.style.width = originalMapSizeRef.current.width;
              mapContainer.style.height = originalMapSizeRef.current.height;
              mapInstanceRef.current.invalidateSize();
              originalMapSizeRef.current = null;
            }
            return;
          }

          const preRenderTime = Date.now() - exportStartTime;
          console.log(`Phase 1 complete: ${renderedFrames.length} frames rendered in ${(preRenderTime/1000).toFixed(1)}s`);
          console.log(`Phase 2: Playing back frames at ${targetFPS} FPS while recording`);
          console.log(`⏱️  Playback will take ${exportDuration}s in real-time`);

          // START RECORDING NOW (only for Phase 2 playback)
          recorder.start(Math.max(10, Math.floor(frameDuration)));
          setIsRecording(true);
          isRecordingRef.current = true;
          console.log('🔴 Recording started');

          // PHASE 2: Play back frames at correct FPS
          const playbackStartTime = Date.now();
          const playbackInterval = frameDuration; // Exact interval for target FPS

          for (let i = 0; i < renderedFrames.length; i++) {
            if (renderCancelledRef.current) {
              break;
            }

            const targetTime = playbackStartTime + (i * playbackInterval);

            // Draw pre-rendered frame to canvas
            const ctx = compositeCanvas.getContext('2d');
            ctx.putImageData(renderedFrames[i], 0, 0);

            // Update progress
            const playbackProgress = (i / renderedFrames.length) * 100;
            setRenderProgress(playbackProgress);

            // Wait until exact target time
            const now = Date.now();
            const waitTime = targetTime - now;
            if (waitTime > 0) {
              await new Promise(resolve => setTimeout(resolve, waitTime));
            }

            // Log every 30 frames
            if (i % 30 === 0) {
              const elapsed = (Date.now() - playbackStartTime) / 1000;
              console.log(`Playback: frame ${i}/${renderedFrames.length} (${elapsed.toFixed(1)}s elapsed)`);
            }
          }

          // Stop recording - show summary
          const totalExportTime = Date.now() - exportStartTime;
          const playbackTime = Date.now() - playbackStartTime;
          console.log(`\n=== Export Complete ===`);
          console.log(`Phase 1 (pre-render): ${(preRenderTime/1000).toFixed(1)}s`);
          console.log(`Phase 2 (playback): ${(playbackTime/1000).toFixed(1)}s`);
          console.log(`Total export time: ${(totalExportTime/1000).toFixed(1)}s`);
          console.log(`Frames rendered: ${renderedFrames.length}`);
          console.log(`Expected video: ${totalFrames} frames at ${targetFPS} FPS = ${exportDuration}s`);
          console.log(`\nℹ️  Video metadata will be inspected when encoding completes...`);
          console.log(`===================================\n`);

          if (mediaRecorderRef.current && mediaRecorderRef.current.state !== 'inactive') {
            mediaRecorderRef.current.stop();
          }

        } catch (err) {
          console.error('Recording error:', err);
          alert('Failed to start recording. Error: ' + err.message);

          // Restore original map size on error
          if (originalMapSizeRef.current) {
            const mapContainer = mapInstanceRef.current.getContainer();
            mapContainer.style.width = originalMapSizeRef.current.width;
            mapContainer.style.height = originalMapSizeRef.current.height;
            mapInstanceRef.current.invalidateSize();
            originalMapSizeRef.current = null;
          }

          setIsRendering(false);
          setIsRecording(false);
          isRecordingRef.current = false;
        }
      };

      const stopRecording = () => {
        renderCancelledRef.current = true;

        if (mediaRecorderRef.current && mediaRecorderRef.current.state !== 'inactive') {
          mediaRecorderRef.current.stop();
        }

        // Update recording state
        isRecordingRef.current = false;
        setIsRendering(false);
        setIsRecording(false);
        setExportFormat('');

        // Cleanup composite canvas if it exists
        if (compositeStreamRef.current) {
          compositeStreamRef.current.getTracks().forEach(track => track.stop());
          compositeStreamRef.current = null;
        }
        compositeCanvasRef.current = null;
      };

      const totalPoints = tracks.reduce((sum, t) => sum + t.points.length, 0);
      const totalDistance = tracks.reduce((sum, track) => {
        let dist = 0;
        for (let i = 1; i < track.points.length; i++) {
          const p1 = track.points[i - 1];
          const p2 = track.points[i];
          dist += getDistance(p1, p2);
        }
        return sum + dist;
      }, 0);

      function getDistance(p1, p2) {
        const R = 6371; // Earth's radius in km
        const dLat = (p2.lat - p1.lat) * Math.PI / 180;
        const dLon = (p2.lon - p1.lon) * Math.PI / 180;
        const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
          Math.cos(p1.lat * Math.PI / 180) * Math.cos(p2.lat * Math.PI / 180) *
          Math.sin(dLon / 2) * Math.sin(dLon / 2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        return R * c;
      }

      return (
        <>
          {/* Hamburger Menu Button (Mobile Only) */}
          <button
            className={`hamburger-btn ${isSidebarOpen ? 'open' : ''}`}
            onClick={toggleSidebar}
            aria-label="Toggle menu"
          >
            <div className="hamburger-line"></div>
            <div className="hamburger-line"></div>
            <div className="hamburger-line"></div>
          </button>

          {/* Backdrop Overlay (Mobile Only) */}
          <div
            className={`sidebar-backdrop ${isSidebarOpen ? 'show' : ''}`}
            onClick={closeSidebar}
          />

          <div className="header">
            <div className="header-content">
              <h1>🗺️ Flyin Amas GPX Track Animator</h1>
              <p>Upload your GPX files and create animated track videos</p>
            </div>
            <div style={{ display: 'flex', alignItems: 'center' }}>
              <div className="version">v{APP_VERSION}</div>
              <button className="help-btn" onClick={toggleHelpModal}>
                ❓ Help
              </button>
            </div>
          </div>
          
          <div className="main-container">
            <div className={`sidebar ${isSidebarOpen ? 'open' : ''}`}>
              <div 
                className={`upload-zone ${dragOver ? 'dragover' : ''}`}
                onClick={() => document.getElementById('file-input').click()}
                onDrop={handleDrop}
                onDragOver={handleDragOver}
                onDragLeave={handleDragLeave}
              >
                <div className="upload-icon">📁</div>
                <div>Drop GPX files here or click to browse</div>
                <input
                  id="file-input"
                  type="file"
                  className="file-input"
                  accept=".gpx"
                  multiple
                  onChange={(e) => handleFileUpload(e.target.files)}
                />
              </div>
              
              {tracks.length > 0 && (
                <div className="track-list">
                  <div className="control-label">Loaded Tracks ({tracks.length})</div>
                  {tracks.map(track => (
                    <div key={track.id} className="track-item">
                      <div className="track-header">
                        <span className="track-name" style={{ color: track.color }}>
                          {track.name}
                        </span>
                        <button 
                          className="track-remove"
                          onClick={() => removeTrack(track.id)}
                        >
                          ✕
                        </button>
                      </div>
                      <input
                        type="text"
                        className="track-label-input"
                        placeholder="Enter label (e.g., 'Morning Run', 'Bike Commute')"
                        value={track.label}
                        onChange={(e) => updateTrackLabel(track.id, e.target.value)}
                      />
                      <div className="track-color-picker">
                        <label>Color:</label>
                        <input
                          type="color"
                          value={track.color}
                          onChange={(e) => updateTrackColor(track.id, e.target.value)}
                        />
                      </div>
                    </div>
                  ))}
                </div>
              )}
              
              {tracks.length > 0 && (
                <>
                  <div className="controls">
                    <div className="control-group">
                      <div className="control-label">Playback</div>
                      <div className="button-group">
                        <button 
                          className="btn btn-primary"
                          onClick={togglePlay}
                        >
                          {isPlaying ? '⏸ Pause' : '▶ Play'}
                        </button>
                        <button 
                          className="btn btn-secondary"
                          onClick={resetAnimation}
                        >
                          ↺ Reset
                        </button>
                      </div>
                      <div
                        className="progress-bar"
                        onClick={handleProgressBarClick}
                        onMouseDown={handleProgressBarMouseDown}
                        style={{ cursor: 'pointer' }}
                      >
                        <div
                          className="progress-fill"
                          style={{ width: `${progress}%` }}
                        />
                      </div>
                    </div>
                    
                    <div className="control-group">
                      <div className="control-label">Speed: {speed.toFixed(1)}x</div>
                      <input
                        type="range"
                        className="slider"
                        min="0.1"
                        max="5"
                        step="0.1"
                        value={speed}
                        onChange={(e) => setSpeed(parseFloat(e.target.value))}
                      />
                    </div>
                    
                    <div className="control-group">
                      <div className="control-label">Animation Style</div>
                      <select 
                        className="select"
                        value={animationStyle}
                        onChange={(e) => setAnimationStyle(e.target.value)}
                      >
                        <option value="sequential">Sequential (one after another)</option>
                        <option value="simultaneous">Simultaneous (all at once)</option>
                      </select>
                    </div>
                    
                    <div className="control-group">
                      <label className="checkbox-group">
                        <input
                          type="checkbox"
                          className="checkbox"
                          checked={showAllTracks}
                          onChange={(e) => setShowAllTracks(e.target.checked)}
                        />
                        <span>Show full track preview</span>
                      </label>
                    </div>
                    
                    <div className="control-group">
                      <label className="checkbox-group">
                        <input
                          type="checkbox"
                          className="checkbox"
                          checked={showLabels}
                          onChange={(e) => setShowLabels(e.target.checked)}
                        />
                        <span>Show track labels</span>
                      </label>
                    </div>

                    <div className="control-group">
                      <label className="checkbox-group">
                        <input
                          type="checkbox"
                          className="checkbox"
                          checked={showLegend}
                          onChange={(e) => setShowLegend(e.target.checked)}
                        />
                        <span>Show legend</span>
                      </label>
                    </div>

                    {showLegend && (
                      <div style={{ marginBottom: '12px', marginLeft: '24px' }}>
                        <label style={{ fontSize: '12px', color: '#999', display: 'block', marginBottom: '4px' }}>Legend Position</label>
                        <select
                          className="select"
                          value={legendPosition}
                          onChange={(e) => setLegendPosition(e.target.value)}
                          style={{ width: '100%' }}
                        >
                          <option value="top-left">Top Left</option>
                          <option value="top-right">Top Right</option>
                          <option value="bottom-left">Bottom Left</option>
                          <option value="bottom-right">Bottom Right</option>
                        </select>
                      </div>
                    )}

                    <div className="control-group">
                      <label className="checkbox-group">
                        <input
                          type="checkbox"
                          className="checkbox"
                          checked={zoomToTrack}
                          onChange={(e) => setZoomToTrack(e.target.checked)}
                        />
                        <span>Zoom to track during playback</span>
                      </label>
                    </div>

                    {zoomToTrack && (
                      <div className="control-group">
                        <div className="control-label">Zoom Level: {zoomLevel}</div>
                        <input
                          type="range"
                          className="slider"
                          min="12"
                          max="18"
                          step="1"
                          value={zoomLevel}
                          onChange={(e) => setZoomLevel(parseInt(e.target.value))}
                        />
                      </div>
                    )}
                  </div>
                  
                  <div className="controls">
                    <div className="control-group">
                      <div className="control-label">Export Settings</div>
                      <div style={{ marginBottom: '12px' }}>
                        <label style={{ fontSize: '12px', color: '#999', display: 'block', marginBottom: '4px' }}>Aspect Ratio</label>

                          className="select"
                          value={exportAspectRatio}

                        </select>
                      </div>
                      <div style={{ marginBottom: '12px' }}>
                        <label style={{ fontSize: '12px', color: '#999', display: 'block', marginBottom: '4px' }}>Resolution</label>
                        <select
                          className="select"
                          value={exportResolution}
                          onChange={(e) => setExportResolution(e.target.value)}
                          disabled={isRecording}
                        >
                          {exportAspectRatio === '16:9' ? (
                            <>
                              <option value="1920x1080">1920x1080 (Full HD)</option>
                              <option value="1280x720">1280x720 (HD)</option>
                              <option value="3840x2160">3840x2160 (4K)</option>
                            </>
                          ) : (
                            <>
                              <option value="1920x1440">1920x1440 (High)</option>
                              <option value="1280x960">1280x960 (Medium)</option>
                              <option value="2560x1920">2560x1920 (Ultra)</option>
                            </>
                          )}
                        </select>
                      </div>
                      <div style={{ marginBottom: '12px' }}>
                        <label style={{ fontSize: '12px', color: '#999', display: 'block', marginBottom: '4px' }}>Quality</label>
                        <select
                          className="select"
                          value={exportQuality}
                          onChange={(e) => setExportQuality(e.target.value)}
                          disabled={isRecording}
                        >
                          <option value="low">Low (~8 Mbps)</option>
                          <option value="medium">Medium (~15 Mbps)</option>
                          <option value="high">High (~25 Mbps) - Recommended</option>
                          <option value="ultra">Ultra (~40 Mbps)</option>
                        </select>
                      </div>
                      <div style={{ marginBottom: '12px' }}>
                        <label style={{ fontSize: '12px', color: '#999', display: 'block', marginBottom: '4px' }}>Frame Rate</label>
                        <select
                          className="select"
                          value={exportFPS}
                          onChange={(e) => setExportFPS(parseInt(e.target.value))}
                          disabled={isRecording}
                        >
                          <option value="24">24 FPS (Cinematic)</option>
                          <option value="30">30 FPS (Standard)</option>
                          <option value="60">60 FPS (Smooth)</option>
                        </select>
                      </div>
                      <div style={{ marginBottom: '12px' }}>
                        <label style={{ fontSize: '12px', color: '#999', display: 'block', marginBottom: '4px' }}>Video Duration: {exportDuration}s ({(exportDuration * exportFPS).toLocaleString()} frames)</label>
                        <input
                          type="range"

                          className="slider"
                          style={{ width: '100%' }}
                        />
                        <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '10px', color: '#666', marginTop: '4px' }}>
                          <span>5s</span>
                          <span>60s</span>

                          <span>300s (5min)</span>
                        </div>
                      </div>

                      <div className="control-label" style={{ marginTop: '20px' }}>Video Title</div>
                      <div style={{ marginBottom: '12px' }}>
                        <label style={{ fontSize: '12px', color: '#999', display: 'block', marginBottom: '4px' }}>Title Text</label>
                        <input
                          type="text"
                          className="select"
                          value={videoTitle}
                          onChange={(e) => setVideoTitle(e.target.value)}
                          placeholder="Enter title (optional)"
                          disabled={isRecording}
                          style={{ width: '100%', fontFamily: 'inherit' }}
                        />
                      </div>
                      <div style={{ marginBottom: '12px' }}>
                        <label style={{ fontSize: '12px', color: '#999', display: 'block', marginBottom: '4px' }}>Position</label>
                        <select

                          value={titlePosition}

                          disabled={isRecording}
                        >
                          <option value="top-left">Top Left</option>
                          <option value="top-center">Top Center</option>
                          <option value="top-right">Top Right</option>
                          <option value="bottom-left">Bottom Left</option>
                          <option value="bottom-center">Bottom Center</option>
                          <option value="bottom-right">Bottom Right</option>
                        </select>
                      </div>
                      <div style={{ marginBottom: '12px' }}>
                        <label style={{ fontSize: '12px', color: '#999', display: 'block', marginBottom: '4px' }}>Font Size: {titleSize}px</label>
                        <input
                          type="range"
                          min="16"
                          max="72"
                          step="2"
                          value={titleSize}
                          onChange={(e) => setTitleSize(parseInt(e.target.value))}
                          disabled={isRecording}
                          style={{ width: '100%' }}
                        />
                      </div>
                      <div style={{ marginBottom: '12px' }}>
                        <label style={{ fontSize: '12px', color: '#999', display: 'block', marginBottom: '4px' }}>Font</label>
                        <select
                          className="select"
                          value={titleFont}
                          onChange={(e) => setTitleFont(e.target.value)}
                          disabled={isRecording}
                        >
                          <option value="Arial">Arial</option>
                          <option value="Helvetica">Helvetica</option>
                          <option value="Georgia">Georgia</option>
                          <option value="Times New Roman">Times New Roman</option>
                          <option value="Courier New">Courier New</option>
                          <option value="Verdana">Verdana</option>
                        </select>
                      </div>
                      <div style={{ marginBottom: '12px' }}>
                        <label style={{ fontSize: '12px', color: '#999', display: 'block', marginBottom: '4px' }}>Color</label>
                        <input
                          type="color"
                          value={titleColor}
                          onChange={(e) => setTitleColor(e.target.value)}
                          disabled={isRecording}
                          style={{ width: '100%', height: '32px', cursor: 'pointer' }}
                        />
                      </div>

                      <button
                        className="btn btn-primary"
                        onClick={isRecording ? stopRecording : startRecording}
                        disabled={isRendering || (isPlaying && !isRecording)}
                      >
                        {isRecording ? '⏹ Stop Export' : '🎥 Export Video'}
                      </button>
                      <p style={{ fontSize: '11px', color: '#999', marginTop: '8px' }}>
                        Renders video with selected quality and frame rate. Higher settings = larger file size.
                      </p>
                    </div>
                  </div>
                  
                  <div className="stats">
                    <div className="stat-row">
                      <span className="stat-label">Total Points:</span>
                      <span className="stat-value">{totalPoints.toLocaleString()}</span>
                    </div>
                    <div className="stat-row">
                      <span className="stat-label">Total Distance:</span>
                      <span className="stat-value">{totalDistance.toFixed(2)} km</span>
                    </div>
                    <div className="stat-row">
                      <span className="stat-label">Tracks Loaded:</span>
                      <span className="stat-value">{tracks.length}</span>
                    </div>
                    {animationStyle === 'simultaneous' && tracks.some(t => t.startTime) && (
                      <div className="stat-row">
                        <span className="stat-label">Time Range:</span>
                        <span className="stat-value">
                          {(() => {
                            const tracksWithTime = tracks.filter(t => t.startTime && t.endTime);
                            if (tracksWithTime.length === 0) return 'N/A';
                            const earliestStart = new Date(Math.min(...tracksWithTime.map(t => t.startTime.getTime())));
                            const latestEnd = new Date(Math.max(...tracksWithTime.map(t => t.endTime.getTime())));
                            return `${earliestStart.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' })} - ${latestEnd.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' })}`;
                          })()}
                        </span>
                      </div>
                    )}
                    {animationStyle === 'simultaneous' && tracks.some(t => t.startTime) && progress > 0 && (
                      <div className="stat-row">
                        <span className="stat-label">Current Time:</span>
                        <span className="stat-value">
                          {(() => {
                            const tracksWithTime = tracks.filter(t => t.startTime && t.endTime);
                            if (tracksWithTime.length === 0) return 'N/A';
                            const earliestStart = Math.min(...tracksWithTime.map(t => t.startTime.getTime()));
                            const latestEnd = Math.max(...tracksWithTime.map(t => t.endTime.getTime()));
                            const totalTimeSpan = latestEnd - earliestStart;
                            const currentAbsoluteTime = earliestStart + (progress / 100) * totalTimeSpan;
                            const currentDate = new Date(currentAbsoluteTime);
                            return currentDate.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                          })()}
                        </span>
                      </div>
                    )}
                  </div>
                </>
              )}
            </div>
            
            <div className="map-container">
              {isRendering && (
                <div className="rendering-overlay">
                  <div className="rendering-content">
                    <div className="rendering-title">Rendering Video</div>
                    <div className="rendering-message">
                      Please wait while frames are being captured with fully loaded map tiles.
                      This process ensures high-quality output.
                    </div>
                    {exportFormat && (
                      <div className="export-format-indicator">
                        Format: {exportFormat}
                      </div>
                    )}
                    <div className="progress-text">{Math.round(renderProgress)}%</div>
                    <div className="progress-bar-container">
                      <div className="progress-bar-fill" style={{ width: `${renderProgress}%` }}></div>
                    </div>
                    <button className="btn btn-secondary" onClick={stopRecording}>
                      Cancel
                    </button>
                  </div>
                </div>
              )}
              {tracks.length > 0 && showLegend && !isRendering && (
                <div
                  className="map-legend"
                  style={{
                    ...(() => {
                      const padding = '20px';
                      const positions = {
                        'top-left': { top: padding, left: padding, bottom: 'auto', right: 'auto' },
                        'top-right': { top: padding, right: padding, bottom: 'auto', left: 'auto' },
                        'bottom-left': { bottom: padding, left: padding, top: 'auto', right: 'auto' },
                        'bottom-right': { bottom: padding, right: padding, top: 'auto', left: 'auto' }
                      };
                      return positions[legendPosition] || positions['bottom-left'];
                    })()
                  }}
                >
                  <div className="legend-title">Tracks</div>
                  {tracks.map(track => (
                    <div key={track.id} className="legend-item">
                      <div className="legend-color" style={{ backgroundColor: track.color }}></div>
                      <div className="legend-label">{track.label}</div>
                    </div>
                  ))}
                </div>
              )}
              {videoTitle && videoTitle.trim() !== '' && (
                <div
                  className="map-title"
                  style={{
                    position: 'absolute',
                    ...(() => {
                      const padding = '30px';
                      const positions = {
                        'top-left': { top: padding, left: padding },
                        'top-center': { top: padding, left: '50%', transform: 'translateX(-50%)' },
                        'top-right': { top: padding, right: padding },
                        'bottom-left': { bottom: padding, left: padding },
                        'bottom-center': { bottom: padding, left: '50%', transform: 'translateX(-50%)' },
                        'bottom-right': { bottom: padding, right: padding }
                      };
                      return positions[titlePosition] || positions['top-left'];
                    })(),
                    fontSize: `${titleSize}px`,
                    fontFamily: titleFont,
                    color: titleColor,
                    fontWeight: '700',
                    textShadow: '2px 2px 4px rgba(0, 0, 0, 0.9), -1px -1px 2px rgba(0, 0, 0, 0.9), 1px -1px 2px rgba(0, 0, 0, 0.9), -1px 1px 2px rgba(0, 0, 0, 0.9)',
                    pointerEvents: 'none',
                    zIndex: 1000,
                    whiteSpace: 'nowrap'
                  }}
                >
                  {videoTitle}
                </div>
              )}
              <div id="map" ref={mapRef}></div>
            </div>
          </div>

          {/* Help Modal */}
          {isHelpModalOpen && (
            <div className="help-modal-overlay" onClick={closeHelpModal}>
              <div className="help-modal" onClick={(e) => e.stopPropagation()}>
                <div className="help-modal-header">
                  <h1 className="help-modal-title">Help & Guide</h1>
                  <button className="help-modal-close" onClick={closeHelpModal}>×</button>
                </div>
                <div className="help-modal-content">

                  {/* What is this app? */}
                  <div className="help-section">
                    <h2>What is Flyin Amas GPX Track Animator?</h2>
                    <p>
                      This web application allows you to visualize and animate GPS tracks from GPX files.
                      Upload your GPS data from activities like running, cycling, paddling, or flying, and
                      create beautiful animated videos showing your route on a satellite map.
                    </p>
                    <div className="feature-list">
                      <ul>
                        <li>Animate single or multiple GPS tracks simultaneously</li>
                        <li>Customize track colors, labels, and appearance</li>
                        <li>Export high-quality videos (up to 4K resolution)</li>
                        <li>Control animation speed, zoom, and playback style</li>
                        <li>Add custom video titles and legends</li>
                        <li>Works entirely in your browser - no server upload required</li>
                      </ul>
                    </div>
                  </div>

                  {/* How to use */}
                  <div className="help-section">
                    <h2>How to Use</h2>
                    <ol>
                      <li><strong>Upload GPX files:</strong> Drag and drop your GPX files into the upload zone, or click to browse</li>
                      <li><strong>Customize tracks:</strong> Edit track labels, change colors, and adjust settings in the sidebar</li>
                      <li><strong>Preview animation:</strong> Click Play to see how your tracks will animate on the map</li>
                      <li><strong>Adjust settings:</strong> Control animation speed, zoom level, and display options</li>
                      <li><strong>Export video:</strong> Configure video settings (resolution, duration, FPS) and click "Export Video"</li>
                      <li><strong>Download:</strong> Wait for the export to complete, then download your animated video</li>
                    </ol>
                    <p>
                      <strong>Note for iOS users:</strong> Video export is not supported on iPhone/iPad due to browser limitations.
                      Please use a desktop browser or use iOS Screen Recording while playing the animation.
                    </p>
                  </div>

                  {/* FAQ */}
                  <div className="help-section">
                    <h2>Frequently Asked Questions</h2>

                    <div className="faq-item">
                      <div className="faq-question">What is a GPX file?</div>
                      <div className="faq-answer">
                        GPX (GPS Exchange Format) is a standard XML format for storing GPS data including waypoints,
                        routes, and tracks. It's universally supported by GPS devices and fitness tracking apps.
                        GPX files contain latitude/longitude coordinates and optionally timestamps, elevation,
                        and other metadata about your recorded activities.
                      </div>
                    </div>

                    <div className="faq-item">
                      <div className="faq-question">How do I get GPX files from my fitness tracking app?</div>
                      <div className="faq-answer">
                        Most fitness apps allow you to export your activities as GPX files. See the detailed
                        instructions below for popular apps like Strava, Garmin, and Paddle Logger.
                      </div>
                    </div>

                    <div className="faq-item">
                      <div className="faq-question">Can I animate multiple tracks at once?</div>
                      <div className="faq-answer">
                        Yes! Upload multiple GPX files and they'll all appear on the map. You can choose between
                        "Simultaneous" mode (all tracks animate based on their actual GPS timestamps) or "Sequential"
                        mode (tracks play one after another in upload order).
                      </div>
                    </div>

                    <div className="faq-item">
                      <div className="faq-question">What video formats are supported?</div>
                      <div className="faq-answer">
                        The app exports videos in WebM or MP4 format depending on your browser. Chrome and Firefox
                        support WebM VP9 (best quality), while Safari may use WebM VP8 or MP4. All modern browsers
                        can play the exported videos.
                      </div>
                    </div>

                    <div className="faq-item">
                      <div className="faq-question">Why is video export slow?</div>
                      <div className="faq-answer">
                        Video export uses a two-phase process: first pre-rendering all frames (which can take several
                        minutes for high-resolution videos), then playing them back at the correct frame rate. Higher
                        resolutions (like 4K), longer durations, and enabled "Zoom to Track" significantly increase
                        export time. For faster exports, try lower resolutions or shorter durations.
                      </div>
                    </div>

                    <div className="faq-item">
                      <div className="faq-question">Is my GPS data uploaded to a server?</div>
                      <div className="faq-answer">
                        No! All processing happens entirely in your browser. Your GPX files are never uploaded to any
                        server - everything stays private on your device.
                      </div>
                    </div>
                  </div>

                  {/* How to download GPX files */}
                  <div className="help-section">
                    <h2>How to Download GPX Files from Popular Apps</h2>

                    <h3><span className="app-badge">STRAVA</span></h3>
                    <ol>
                      <li>Log in to <a href="https://www.strava.com" target="_blank" rel="noopener noreferrer">Strava.com</a> on a desktop browser</li>
                      <li>Navigate to your activity</li>
                      <li>Click the three-dot menu (⋯) in the top right</li>
                      <li>Select "Export GPX"</li>
                      <li>The GPX file will download to your computer</li>
                    </ol>
                    <p><strong>Bulk export:</strong> Go to Settings → My Account → Download or Delete Your Account →
                    Request Your Archive to download all activities at once.</p>

                    <h3><span className="app-badge">GARMIN CONNECT</span></h3>
                    <ol>
                      <li>Log in to <a href="https://connect.garmin.com" target="_blank" rel="noopener noreferrer">Garmin Connect</a></li>
                      <li>Open your activity</li>
                      <li>Click the gear icon (⚙️) in the top right</li>
                      <li>Select "Export to GPX"</li>
                      <li>Save the file to your computer</li>
                    </ol>
                    <p><strong>Note:</strong> You can also export from the Garmin Connect mobile app:
                    Open activity → Share icon → Export to GPX.</p>

                    <h3><span className="app-badge">PADDLE LOGGER</span></h3>
                    <ol>
                      <li>Open the Paddle Logger app</li>
                      <li>View your paddle session</li>
                      <li>Tap the Share/Export button</li>
                      <li>Select "Export as GPX"</li>
                      <li>Choose where to save or share the file</li>
                    </ol>
                    <p><strong>Tip:</strong> You can email the GPX file to yourself or save it to cloud storage
                    for easy access on your computer.</p>

                    <h3><span className="app-badge">APPLE HEALTH / WORKOUTS</span></h3>
                    <ol>
                      <li>Download a third-party app like "HealthFit" or "RunGap" from the App Store</li>
                      <li>Grant the app permission to read your Health data</li>
                      <li>Select the workout you want to export</li>
                      <li>Choose "Export as GPX"</li>
                      <li>Share or save the GPX file</li>
                    </ol>
                    <p><strong>Note:</strong> Apple Health doesn't natively export GPX files, so you'll need
                    a third-party app.</p>

                    <h3><span className="app-badge">KOMOOT</span></h3>
                    <ol>
                      <li>Go to <a href="https://www.komoot.com" target="_blank" rel="noopener noreferrer">Komoot.com</a></li>
                      <li>Open your completed tour</li>
                      <li>Click "Export" or the download icon</li>
                      <li>Select "GPX Track"</li>
                      <li>Download the file</li>
                    </ol>

                    <h3><span className="app-badge">RELIVE</span></h3>
                    <ol>
                      <li>Open your activity in the Relive app or website</li>
                      <li>Tap/click the Share button</li>
                      <li>Select "Export GPX"</li>
                      <li>Save or share the file</li>
                    </ol>

                    <h3><span className="app-badge">MAPMYRUN / MAPMYRIDE</span></h3>
                    <ol>
                      <li>Log in to <a href="https://www.mapmyrun.com" target="_blank" rel="noopener noreferrer">MapMyRun.com</a> or MapMyRide.com</li>
                      <li>Go to your workout details</li>
                      <li>Click the gear icon or "Export" button</li>
                      <li>Choose "Export as GPX"</li>
                      <li>Download the file</li>
                    </ol>

                    <h3><span className="app-badge">RIDE WITH GPS</span></h3>
                    <ol>
                      <li>Log in to <a href="https://ridewithgps.com" target="_blank" rel="noopener noreferrer">RideWithGPS.com</a></li>
                      <li>Open your ride/trip</li>
                      <li>Click "Export" in the menu</li>
                      <li>Select "GPX Track"</li>
                      <li>Download the file</li>
                    </ol>

                    <h3><span className="app-badge">WIKILOC</span></h3>
                    <ol>
                      <li>Go to <a href="https://www.wikiloc.com" target="_blank" rel="noopener noreferrer">Wikiloc.com</a></li>
                      <li>Open your trail</li>
                      <li>Click "Download" button</li>
                      <li>Select "GPX" format</li>
                      <li>Save the file</li>
                    </ol>

                    <p style={{ marginTop: '20px', fontStyle: 'italic', color: '#999' }}>
                      <strong>Can't find your app?</strong> Most fitness and GPS tracking apps support GPX export.
                      Look for "Export", "Share", or "Download" options in your activity details, or check the
                      app's help documentation.
                    </p>
                  </div>

                  {/* Tips & Tricks */}
                  <div className="help-section">
                    <h2>Tips & Tricks</h2>
                    <ul>
                      <li><strong>Best video quality:</strong> Use "High" or "Ultra" quality preset and 1080p or 4K resolution</li>
                      <li><strong>Smooth animation:</strong> Set FPS to 30 or 60 for fluid motion</li>
                      <li><strong>Quick exports:</strong> Disable "Zoom to Track" and use lower resolutions (720p)</li>
                      <li><strong>Compare routes:</strong> Upload multiple GPX files and use "Simultaneous" mode to see how they align</li>
                      <li><strong>Custom labels:</strong> Give your tracks meaningful names like "Morning Run" or "Weekend Ride"</li>
                      <li><strong>Perfect timing:</strong> Adjust video duration (5-300 seconds) to match your desired pacing</li>
                    </ul>
                  </div>

                </div>
              </div>
            </div>
          )}
        </>
      );
    }

    ReactDOM.render(<GPXTrackAnimator />, document.getElementById('root'));
  </script>
</body>
</html>
